<html>

  <script>

    fetch("https://script.google.com/macros/s/AKfycbz4VKbbgskznFnxDqhzGPlsdidI-Dy3nDb-7X3mv7S_q1Cd0XngBsxSfiPfvhWieYPu5A/exec", {
      method: "GET" // 👈 必須改成 GET，而且這裡絕對不能有 body！
    })
    .then(res => res.json()) // 2. 將回傳的文字轉成 JSON 物件
    .then(rows => {
      // 3. 這裡的 rows 就是你 Google Sheets 裡面的所有資料了！
      console.log("成功拿到資料：", rows);
      
      // 範例：你可以用來把資料渲染到網頁畫面上
      // alert(JSON.stringify(rows)); 
    })
    .catch(err => {
      console.error("抓取資料失敗：", err);
    });

  </script>
